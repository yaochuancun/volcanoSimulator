<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volcano Simulator</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-left">
        <div class="hero-icon" aria-hidden="true">◇</div>
        <div>
          <h1>Volcano Simulator</h1>
          <p class="hero-sub">Scheduling simulation — cluster / workload / multi-plugins</p>
        </div>
      </div>
      <div class="hero-status" id="svcStatus">
        <span class="dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Checking…</span>
      </div>
    </header>

    <section class="toolbar">
      <button type="button" class="btn btn-secondary" id="btnExport" disabled>
        Export Data (ZIP)
      </button>
      <div class="toolbar-divider"></div>
      <button type="button" class="btn btn-primary" id="btnRun">
        Start Simulation
      </button>
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-label" id="progressLabel">0%</span>
      </div>
      <p class="run-msg" id="runMsg"></p>
    </section>

    <div class="grid-main">
      <aside class="panel">
        <h3 class="panel-title">Configuration</h3>
        <label class="file-label">Node config → cluster.yaml</label>
        <input type="file" id="fileCluster" accept=".yaml,.yml,.txt" />
        <label class="file-label">Pod config → workload.yaml</label>
        <input type="file" id="fileWorkload" accept=".yaml,.yml,.txt" />
        <label class="file-label">Plugins config → plugins.yaml（可多选，每个文件一种调度算法）</label>
        <input type="file" id="filePlugins" accept=".yaml,.yml,.txt" multiple />
        <div class="scale-box">
          <label class="file-label" for="scaleInput">Workload scale（逗号分隔，replicas×系数 向上取整）</label>
          <input type="text" id="scaleInput" class="scale-input" value="1.0, 2.0" placeholder="e.g. 1.0, 2.25, 5.0" />
        </div>
      </aside>

      <div class="main-col">
        <section class="card chart-card">
          <div class="card-head">
            <h2>Cluster resource analysis</h2>
            <p class="card-desc">折线：各算法节点平均分配率（%）；柱：首次快照 Running Pod 数</p>
          </div>
          <div class="svg-wrap" id="chartMount"></div>
        </section>

        <section class="card">
          <div class="card-head">
            <h2>NPU fragmentation rate (%)</h2>
            <p class="card-desc">（集群剩余 core − 单节点剩余 core 最大）/ 集群总 core 容量 ×100</p>
          </div>
          <div class="table-wrap">
            <table class="data-table" id="fragTable">
              <thead><tr><th>Algorithm</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
