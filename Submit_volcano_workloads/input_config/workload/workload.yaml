# yaml-language-server: $schema=../../schemas/workload/workload-input.schema.json
apiVersion: v1
kind: JobList
spec:
  npuGranularityPercent: 25
jobs:
  - apiVersion: batch.volcano.sh/v1alpha1
    kind: Job
    metadata:
      labels:
        sub-time: '0'
      name: test-job-0
      namespace: default
      annotations:
        volcano.sh/flexnpu-num: '{ "test-container-0": 2, "test-container-1": 3 }'
    spec:
      minAvailable: 2
      schedulerName: volcano
      tasks:
        - name: test-pod
          replicas: 2
          spec:
            containers:
              - name: test-container-0
                resources:
                  requests:
                    cpu: '0.3'
                    memory: 8.82Gi
                    volcano.sh/flexnpu-core.percentage: "50.0"
                    volcano.sh/flexnpu-memory.128mi: "0.5"
                  limits:
                    cpu: '0.8'
                    memory: 18.82Gi
                    volcano.sh/flexnpu-core.percentage: "70.0"
                    volcano.sh/flexnpu-memory.128mi: "0.7"
              - name: test-container-1
                resources:
                  requests:
                    cpu: '0.3'
                    memory: 8Gi
                    volcano.sh/flexnpu-core.percentage: "50.0"
                    volcano.sh/flexnpu-memory.128mi: "0.5"
                  limits:
                    cpu: '0.4'
                    memory: 9.82Gi
                    volcano.sh/flexnpu-core.percentage: "60.0"
                    volcano.sh/flexnpu-memory.128mi: "0.6"
  - apiVersion: batch.volcano.sh/v1alpha1
    kind: Job
    metadata:
      labels:
        sub-time: '0'
      name: test-job-1
      namespace: default
      annotations:
        volcano.sh/flexnpu-num: '{ "test-container-0": 1 }'
    spec:
      minAvailable: 5
      schedulerName: volcano
      tasks:
        - name: test-pod
          replicas: 5
          spec:
            containers:
              - name: test-container-0
                resources:
                  requests:
                    cpu: '0.3'
                    memory: 4.82Gi
                    volcano.sh/flexnpu-core.percentage: "20.0"
                    volcano.sh/flexnpu-memory.128mi: "0.2"
                  limits:
                    cpu: '0.5'
                    memory: 6.52Gi
                    volcano.sh/flexnpu-core.percentage: "50.0"
                    volcano.sh/flexnpu-memory.128mi: "0.5"
